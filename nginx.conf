server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — returns HTTP 200 + JSON
    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"brownies-landing"}';
    }

    # Health check alias (common Coolify/default format)
    location = /healthz {
        default_type application/json;
        return 200 '{"status":"healthy","service":"brownies-landing"}';
    }
}
