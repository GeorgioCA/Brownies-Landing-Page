version: '3.8'
services:
  brownies:
    build: .
    container_name: brownies-landing
    # ports:
    #   - "8080:80"
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
